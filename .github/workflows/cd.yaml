name: CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-push-artifacts:
    name: Build and push artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Image Version
        id: set_version
        env:
          VERSION_OVERRIDE: ""
          PROJECT_PATH: "app"
        run: ./.github/scripts/get_app_version_from_toml.sh

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/user-management:latest
            ghcr.io/${{ github.repository }}/user-management:${{ steps.set_version.outputs.version }}
            ghcr.io/${{ github.repository }}/user-management:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Packages (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package ./helm
          helm push user-management-${{ steps.set_version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository }}/charts

  simulate-deployment:
    runs-on: ubuntu-latest
    needs: [ build-push-artifacts ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: test-cluster

      - name: Install LocalStack in Cluster
        run: |
          helm repo add localstack https://helm.localstack.cloud
          helm repo update
          helm install localstack localstack/localstack \
            --set "startServices=s3\,dynamodb\,iam\,sts" \
            --wait --timeout 5m

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - name: Terraform Init & Apply (LocalStack in K8s)
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="is_local_test=true" \
            -var="eks_oidc_issuer_url=http://localstack.default.svc.cluster.local:4566" \
            -var="localstack_endpoint=http://localstack.default.svc.cluster.local:4566"
        working-directory: ./IaC
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Deploy Application Helm Chart
        run: |
          helm install user-management ./helm \
            --set env.is_local=true \
            --set env.AWS_ENDPOINT_URL=http://localstack.default.svc.cluster.local:4566 \
            --wait --timeout 5m

      - name: Verify Kubernetes Resources
        run: |
          kubectl get pods
          kubectl get svc
          kubectl describe pods -l app.kubernetes.io/name=user-management
