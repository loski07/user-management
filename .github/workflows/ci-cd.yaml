name: CI/CD Pipeline

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'app/src'
      - 'app/Dockerfile'
      - 'app/docker-compose.yaml'
      - 'app/init-aws.sh'
      - 'app/pyproject.toml'
      - 'helm'
      - '.github/workflows/ci-cd.yaml' # Always run CI if workflow itself changes
  push:
    branches: [ master ]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3,dynamodb
          DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        ports:
          - "4566:4566" # Default Localstack port
        options: >-
          --health-cmd "curl http://localhost:4566/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Based on Dockerfile

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./app[dev]

      - name: Run Black Linter
        run: black -l 120 --check ./app

      - name: Run isort Linter
        run: isort --check-only ./app

      - name: Run Mypy Type Checker
        run: mypy ./app

      - name: Build Docker Image (Validation)
        run: docker build -t user-management:ci-validation ./app

      - name: Run Unit Tests
        working-directory: ./app
        run: PYTHONPATH=.. pytest test/unit_tests.py

      - name: Wait for Localstack to be ready
        # Give Localstack a moment after health check passes, especially for initial setup
        run: sleep 10

      - name: Initialize Localstack AWS resources
        working-directory: ./app
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: user-avatars # From integration_tests.py
          DYNAMODB_TABLE_NAME: users-table # From integration_tests.py
        run: ./init-aws.sh

      - name: Run Integration Tests
        working-directory: ./app
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: user-avatars # From integration_tests.py
          DYNAMODB_TABLE_NAME: users-table # From integration_tests.py
        run: PYTHONPATH=.. pytest test/integration_tests.py

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci # Only run CD if CI passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/${{ github.repository }}/user-management:latest,ghcr.io/${{ github.repository }}/user-management:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Packages (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package ./helm
          helm push user-management-0.1.0.tgz oci://ghcr.io/${{ github.repository }}
